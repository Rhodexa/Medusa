<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Dial — dev</title>
<link rel="stylesheet" href="../data/style.css">
<style>
    :root {
        --clr-on:  #1ac8b9;
        --clr-off: #eba206;
    }
    /* Drag cursor on display area */
    .np-display { cursor: ns-resize; touch-action: none; user-select: none; }

    /* Wheel */
    #phase-wheel { display: block; cursor: grab; touch-action: none; }
    #phase-wheel:active { cursor: grabbing; }
    .wheel-legend {
        display: flex; justify-content: center; gap: 1rem;
        font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
        text-transform: uppercase; opacity: 0.75; margin-top: 0.3rem;
    }
    .wheel-legend span { display: flex; align-items: center; gap: 0.3rem; }
    .wheel-legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    /* Sandbox controls */
    .sandbox-ctrl {
        display: flex; align-items: center; gap: 0.6rem;
        font-size: 0.75rem; opacity: 0.55;
    }
    .sandbox-ctrl input[type=checkbox] { width: auto; border: none; border-bottom: none; }
</style>
</head>
<body>
<div class="page" style="max-width:420px; padding-top:2rem; gap:1.4rem">

  <div style="color:var(--clr-on); font-size:1.2rem; font-weight:700; letter-spacing:0.08em">
    Timer Dial <span style="opacity:0.4; font-size:0.8rem; font-weight:400">dev sandbox</span>
  </div>

  <!-- Main row: dials + wheel -->
  <div style="display:flex; gap:1rem; align-items:center">

    <!-- Dials -->
    <div style="flex:1; display:flex; flex-direction:column; gap:0.75rem">
      <div id="on-dial"></div>
      <div id="off-dial"></div>
    </div>

    <!-- Phase wheel -->
    <div style="display:flex; flex-direction:column; align-items:center">
      <svg id="phase-wheel" width="148" height="148" viewBox="-74 -74 148 148">
        <!-- Background -->
        <circle r="65" fill="rgba(0,0,0,0.35)" stroke="rgba(26,148,138,0.2)" stroke-width="1"/>
        <!-- Arc ring — rotated by JS -->
        <g id="wheel-arcs"></g>
        <!-- Fixed pointer at 12 o'clock -->
        <polygon points="0,-71 -5,-59 5,-59" fill="white" opacity="0.9"/>
        <!-- Center readout -->
        <text id="wc-phase" y="-4" text-anchor="middle" fill="white"
              font-size="12" font-weight="700" font-family="monospace" opacity="0.8">-:--</text>
        <text id="wc-label" y="12" text-anchor="middle" fill="white"
              font-size="8" font-family="sans-serif" opacity="0.35"
              letter-spacing="0.1em">FASE</text>
      </svg>
      <div class="wheel-legend">
        <span><i style="background:var(--clr-on)"></i>ON</span>
        <span><i style="background:var(--clr-off)"></i>OFF</span>
      </div>
    </div>

  </div>

  <!-- Sandbox controls -->
  <div class="sandbox-ctrl">
    <label>
      <input type="checkbox" id="autoAdvance" checked>
      Auto-avanzar fase (60×)
    </label>
    <span id="simPhaseDisplay"></span>
  </div>

  <!-- Debug -->
  <div class="panel" style="font-size:0.78rem; opacity:0.55; font-family:monospace; line-height:1.7">
    <div>on_min <span id="dbg-on">—</span> &nbsp;·&nbsp; off_min <span id="dbg-off">—</span></div>
    <div>on_ms  <span id="dbg-on-ms">—</span></div>
    <div>off_ms <span id="dbg-off-ms">—</span></div>
  </div>

</div>

<!-- Shared modal -->
<div class="dial-modal-backdrop" id="dialModal">
  <div class="dial-modal">
    <div class="dial-modal-title" id="modalTitle"></div>
    <input type="number" id="modalInput" min="0" inputmode="numeric">
    <div class="dial-modal-btns">
      <button class="btn btn-ghost" onclick="modalCancel()">Cancelar</button>
      <button class="btn btn-teal"  onclick="modalConfirm()">Listo</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// DIAL
// ═══════════════════════════════════════════════════════════════════════════════

function createDial(containerId, id, label, initMin, onChange) {
    const raw = { value: Math.max(0, Math.round(initMin)) };

    const hours   = () => Math.floor(raw.value / 60);
    const minutes = () => raw.value % 60;

    function update() {
        raw.value = Math.max(0, raw.value);
        document.getElementById(`${id}-h`).textContent = hours();
        document.getElementById(`${id}-m`).textContent = String(minutes()).padStart(2, '0');
        onChange(raw.value);
    }

    function stepH(dir) { raw.value += dir * 60; update(); }
    function stepM(dir) { raw.value += dir;       update(); }

    function editHours() {
        openModal('Horas', hours(), 0, null, v => {
            raw.value += (v - hours()) * 60;
            update();
        });
    }
    function editMinutes() {
        openModal('Minutos', minutes(), 0, 59, v => {
            raw.value += v - minutes();
            update();
        });
    }

    document.getElementById(containerId).innerHTML = `
        <div class="timer-row">
            <span class="timer-lbl">${label}</span>
            <div class="timer-pair">
                ${pickerHTML(id+'-ph', id+'-h', hours(), 'h')}
                ${pickerHTML(id+'-pm', id+'-m', String(minutes()).padStart(2,'0'), 'min')}
            </div>
        </div>`;

    // Hours: 60px per step (1 step = 1 hour). Minutes: 14px per step (1 step = 1 min).
    bindPicker(id+'-ph', d => stepH(d), editHours,   60);
    bindPicker(id+'-pm', d => stepM(d), editMinutes, 14);

    return { getRaw: () => raw.value };
}

// ─── Picker HTML ───────────────────────────────────────────────────────────────
const SVG_UP = `<svg width="16" height="9" viewBox="0 0 16 9" fill="none"><path d="M1 8L8 1L15 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const SVG_DN = `<svg width="16" height="9" viewBox="0 0 16 9" fill="none"><path d="M1 1L8 8L15 1" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function pickerHTML(pid, dispId, val, unit) {
    return `
    <div class="num-picker" id="${pid}">
        <button class="np-btn" id="${pid}-up">${SVG_UP}</button>
        <div class="np-display" id="${pid}-tap">
            <span class="np-num" id="${dispId}">${val}</span>
            <span class="np-unit">${unit}</span>
        </div>
        <button class="np-btn" id="${pid}-dn">${SVG_DN}</button>
    </div>`;
}

// ─── Long-press (for ▲▼ buttons) ──────────────────────────────────────────────
const NP_DELAY = 340, NP_RATE = 80;
let _npTimer = null;

function bindLongPress(el, fn) {
    const stop = () => { clearTimeout(_npTimer); clearInterval(_npTimer); _npTimer = null; };
    el.addEventListener('pointerdown',   () => { fn(); _npTimer = setTimeout(() => { _npTimer = setInterval(fn, NP_RATE); }, NP_DELAY); });
    el.addEventListener('pointerup',     stop);
    el.addEventListener('pointerleave',  stop);
    el.addEventListener('pointercancel', stop);
}

// ─── Drag + tap (for display area) ────────────────────────────────────────────
function bindPicker(pid, stepFn, tapFn, pxPerStep) {
    bindLongPress(document.getElementById(pid+'-up'), () => stepFn( 1));
    bindLongPress(document.getElementById(pid+'-dn'), () => stepFn(-1));

    const tap  = document.getElementById(pid+'-tap');
    let lastY  = null, accum = 0, moved = 0;

    tap.addEventListener('pointerdown', e => {
        lastY = e.clientY; accum = 0; moved = 0;
        tap.setPointerCapture(e.pointerId);
        e.preventDefault();
    });
    tap.addEventListener('pointermove', e => {
        if (lastY === null) return;
        const dy = lastY - e.clientY;   // up = positive = increase
        lastY = e.clientY;
        accum += dy;
        moved += Math.abs(dy);
        while (accum >=  pxPerStep) { stepFn( 1); accum -= pxPerStep; }
        while (accum <= -pxPerStep) { stepFn(-1); accum += pxPerStep; }
    });
    tap.addEventListener('pointerup', () => {
        if (moved < 6) tapFn();         // small movement = tap = open modal
        lastY = null;
    });
    tap.addEventListener('pointercancel', () => { lastY = null; });
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════════════════════

let _mCb = null, _mMax = null;

function openModal(title, cur, min, max, cb) {
    _mCb = cb; _mMax = max;
    document.getElementById('modalTitle').textContent = title;
    const inp = document.getElementById('modalInput');
    inp.min = min ?? 0; inp.max = max ?? ''; inp.value = cur;
    document.getElementById('dialModal').classList.add('open');
    setTimeout(() => { inp.focus(); inp.select(); }, 60);
}
function modalConfirm() {
    let v = parseInt(document.getElementById('modalInput').value, 10);
    if (isNaN(v) || v < 0) v = 0;
    if (_mMax != null && v > _mMax) v = _mMax;
    document.getElementById('dialModal').classList.remove('open');
    if (_mCb) _mCb(v);
    _mCb = null;
}
function modalCancel() {
    document.getElementById('dialModal').classList.remove('open');
    _mCb = null;
}
document.getElementById('dialModal').addEventListener('click',
    e => { if (e.target === e.currentTarget) modalCancel(); });
document.getElementById('modalInput').addEventListener('keydown', e => {
    if (e.key === 'Enter')  modalConfirm();
    if (e.key === 'Escape') modalCancel();
});

// ═══════════════════════════════════════════════════════════════════════════════
// PHASE WHEEL
// ═══════════════════════════════════════════════════════════════════════════════

// phaseOffsetMs is in real ms; we scale by SIM_SPEED when computing phase.
const SIM_SPEED   = 60;       // 1 real second = 60 simulated seconds
let phaseOffsetMs = 0;        // user-dragged phase shift (real ms, pre-scaled)

function getPhaseMin() {
    const totalMin = onDial.getRaw() + offDial.getRaw();
    if (totalMin === 0) return 0;
    const totalRealMs = (totalMin * 60000) / SIM_SPEED;
    const elapsed = (Date.now() + phaseOffsetMs) % totalRealMs;
    return (elapsed / totalRealMs) * totalMin;
}

// Build an annular sector path (donut slice) centered at origin.
// Angles in degrees, 0° = top (12 o'clock), clockwise.
// Director's note: Doesn't it make more sense to build the wheel the same way you would build a
// knob, or spinner, or progress arc?
// One big --clr-secodnary circle, then use dash lines in SVG to fill the --clr-primary region as a fraction of progress along the phase
// The using the dash offset allows to easily offset the phase visually.
// This creates trouble in the future, if we add a programming, rather than an on/off sequence... but in this case that's perfectly fine, and the sectored arc would be future-us' problem.
function annularSector(r1, r2, startDeg, spanDeg) {
    // Full-circle guard — avoid degenerate path
    const sweep = Math.min(spanDeg, 359.9);
    const s = (startDeg - 90) * Math.PI / 180;
    const e = (startDeg + sweep - 90) * Math.PI / 180;
    const lg = sweep > 180 ? 1 : 0;
    const f = n => n.toFixed(3);
    const ox1 = r2*Math.cos(s), oy1 = r2*Math.sin(s);
    const ox2 = r2*Math.cos(e), oy2 = r2*Math.sin(e);
    const ix1 = r1*Math.cos(s), iy1 = r1*Math.sin(s);
    const ix2 = r1*Math.cos(e), iy2 = r1*Math.sin(e);
    return `M ${f(ox1)} ${f(oy1)} A ${r2} ${r2} 0 ${lg} 1 ${f(ox2)} ${f(oy2)}`
         + ` L ${f(ix2)} ${f(iy2)} A ${r1} ${r1} 0 ${lg} 0 ${f(ix1)} ${f(iy1)} Z`;
}

function updateWheel() {
    const onMin  = onDial.getRaw();
    const offMin = offDial.getRaw();
    const total  = onMin + offMin;
    const arcs   = document.getElementById('wheel-arcs');
    const wcP    = document.getElementById('wc-phase');
    const wcL    = document.getElementById('wc-label');

    if (total === 0) {
        arcs.innerHTML = '';
        wcP.textContent = '-:--';
        wcL.textContent = 'FASE';
        return;
    }

    const phaseMin   = getPhaseMin();
    const phaseAngle = (phaseMin / total) * 360;   // degrees into cycle
    const onAngle    = (onMin    / total) * 360;   // how big the ON arc is

    // Rotate the ring so the current phase aligns with the top pointer
    arcs.setAttribute('transform', `rotate(${-phaseAngle})`);

    // Rebuild arcs (only when dials change; but cheap enough to do every frame)
    arcs.innerHTML =
        `<path d="${annularSector(42, 64, 0, onAngle)}"
               fill="rgba(26,200,185)" stroke="rgb(0, 0, 0)" stroke-width="1"/>` +
        (offMin > 0
            ? `<path d="${annularSector(42, 64, onAngle, 360 - onAngle)}"
                      fill="rgba(235,162,6)" stroke="rgb(0, 0, 0)" stroke-width="1"/>`
            : '');

    // Center: current phase as h:mm  + ON / OFF label
    const ph  = Math.floor(phaseMin / 60);
    const pm  = Math.floor(phaseMin % 60);
    wcP.textContent = `${ph}:${String(pm).padStart(2,'0')}`;
    wcL.textContent = phaseMin < onMin ? 'ON' : 'OFF';
    wcL.setAttribute('fill', phaseMin < onMin ? 'var(--clr-on)' : 'var(--clr-off)');
}

// ─── Wheel drag (rotates ring = seeks phase) ───────────────────────────────────
// Director's notes (lol). I think this looks coo. But angle-locked wheel turning has a LONG history of being VERY annoying to use
// Often you wanna keep dragging and have it keep rotating... there must be a better way.
// I have a complex idea that could revolutionize wheels. (Not knobs but wheels.)
// When the pointer is dragged, create a line that passes right through the path of motion;
// The create a line perpendicular to it that passes through the wheel's axis.
// Now, calculate the delta moved _along_ that axis.
// Essentially, the line is the new coordinate space, how much you moved along that line is the amount and direction to turn the wheel
// The distance of that line from the origin is the rate scaler
// Let's do this math:
// let's create the point P and P_prev. P_prev is just P from the last read.
// P is the pointer position.
// Let's creat O the origin. which is just 0,0
// Then create P_start.
// 
// Let's create R, for rotate..

// nope.. this is too hard lol

/// meh... maybe a classic if x > 0, rotate clockwise when dragging down
/// else rotate clockwise when dragging up. Nobody slides wheels sideways lol, and if they do, we can add more checks:
// y > 0 ? or not?
// so we just devide in quadrants with four different axis-aligned behaviours. easy, more stable.


const wheelEl = document.getElementById('phase-wheel');
let _wAngle = null;

function pointerAngleDeg(e) {
    const r  = wheelEl.getBoundingClientRect();
    const cx = r.left + r.width  / 2;
    const cy = r.top  + r.height / 2;
    return Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
}

wheelEl.addEventListener('pointerdown', e => {
    _wAngle = pointerAngleDeg(e);
    wheelEl.setPointerCapture(e.pointerId);
});
wheelEl.addEventListener('pointermove', e => {
    if (_wAngle === null) return;
    let delta = pointerAngleDeg(e) - _wAngle;
    if (delta >  180) delta -= 360;  // wrap
    if (delta < -180) delta += 360;
    _wAngle = pointerAngleDeg(e);

    const totalMin = onDial.getRaw() + offDial.getRaw();
    if (totalMin > 0) {
        // clockwise drag → advance phase
        const totalRealMs = (totalMin * 60000) / SIM_SPEED;
        phaseOffsetMs -= (delta / 360) * totalRealMs;
    }
});
wheelEl.addEventListener('pointerup',     () => { _wAngle = null; });
wheelEl.addEventListener('pointercancel', () => { _wAngle = null; });

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════

function updateDebug() {
    document.getElementById('dbg-on').textContent     = onDial.getRaw();
    document.getElementById('dbg-off').textContent    = offDial.getRaw();
    document.getElementById('dbg-on-ms').textContent  = onDial.getRaw()  * 60000;
    document.getElementById('dbg-off-ms').textContent = offDial.getRaw() * 60000;
}

function onDialChange() { updateDebug(); updateWheel(); }

const onDial  = createDial('on-dial',  'on',  'Encender por', 90,  onDialChange);
const offDial = createDial('off-dial', 'off', 'Apagar por',   30,  onDialChange);

updateDebug();

// Animation loop — only runs when auto-advance checkbox is on
let _rafId = null;
function animLoop() {
    if (document.getElementById('autoAdvance').checked) updateWheel();
    _rafId = requestAnimationFrame(animLoop);
}
animLoop();

// Static update when auto-advance is off but wheel was dragged
wheelEl.addEventListener('pointermove', updateWheel);
</script>
</body>
</html>
