<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Threshold Editor — Template</title>
<style>
    /* ── Base (mirrors index.html) ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background: rgb(9,32,34);
        color: white;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        align-items: flex-start;
    }

    /* shared form controls */
    input[type="text"], input[type="number"], select {
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(26,148,138,0.45);
        border-radius: 0;
        color: white;
        padding: 0.38rem 0.6rem;
        font-size: 0.88rem;
        outline: none;
        width: 100%;
        transition: border-color 0.12s;
    }
    input:focus, select:focus { border-bottom-color: rgb(26,148,138); }
    select { background: rgb(9,32,34); }
    select option { background: rgb(9,32,34); }

    /* ── Save button ─────────────────────────────────────────────────────── */
    .save-rule {
        align-self: stretch;
        background: #15a185;
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        padding: 0.6rem;
        cursor: pointer;
        font-size: 0.9rem;
        transition: opacity 0.12s;
    }
    .save-rule:hover { opacity: 0.85; }

    /* ── Card / drawer wrapper ───────────────────────────────────────────── */
    .rule-inner {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(26,148,138,0.18);
        border-radius: 10px;
        padding: 0.9rem;
    }

    /* ── Sensor/threshold editor — EDIT THIS SECTION ─────────────────────── */

    /*
     * 5 columns:  [sensor]  [condition]  [picker]  [arrow]  [badge]
     *  auto         auto       auto       1.8rem     1fr
     *
     * The badge column is 1fr so it always fills the remaining width.
     * Swap button row uses grid-column: 1 / -1 to span everything.
     */
    .thresh-grid {
        display: grid;
        grid-template-columns: auto auto auto 1.8rem 1fr;
        gap: 0.4rem 0.6rem;
        align-items: center;
        width: 100%;
    }

    /* Header labels */
    .tg-hdr {
        font-size: 0.65rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.08em;
        opacity: 0.38; text-align: center;
    }

    /* Sensor dropdown */
    .thresh-sensor-sel {
        background: rgba(1,90,71,0.333);
        border: 1px solid rgba(30,175,156,0.61);
        border-radius: 5px;
        font-weight: 700; font-size: 0.85rem;
        color: inherit; cursor: pointer;
        padding: 0.45rem 0.5rem;
        width: 100%;
    }

    /* Condition cell: label + chevron side by side */
    .tg-cond {
        display: flex; align-items: center; gap: 0.35rem;
        white-space: nowrap;
    }
    .thresh-cond-lbl {
        font-size: 0.72rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.05em;
        opacity: 0.55;
    }
    .thresh-chevron { opacity: 0.45; display: flex; align-items: center; flex-shrink: 0; }

    /* Arrow → */
    .thresh-arrow { opacity: 0.65; display: flex; align-items: center; justify-content: center; }

    /* ENCENDER / APAGAR badge */
    .thresh-badge {
        border-radius: 6px; font-weight: bold; font-size: 0.88rem;
        letter-spacing: 0.06em; padding: 0.5rem 0.6rem; cursor: pointer;
        transition: opacity 0.12s; display: flex;
        justify-content: center; align-items: center; width: 100%;
    }
    .thresh-badge:hover { opacity: 0.75; }
    .thresh-badge.on  { background: rgba(26,148,138,0.22); color: white; border: 1px solid rgb(30,175,102); }
    .thresh-badge.off { background: rgba(201,13,60,0.479);  color: white; border: 1px solid rgb(236,58,97); }

    /* Swap button — sits in the badge column only (col 5) */
    .thresh-swap-btn {
        grid-column: 5;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 8px;
        color: white;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        padding: 0.9rem 1rem;
        transition: background 0.12s;
        width: 100%;
    }
    .thresh-swap-btn:hover { background: rgba(255,255,255,0.18); }

    /* ── Custom number picker ────────────────────────────────────────────── */
    .num-picker {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(26,148,138,0.4);
        border-radius: 8px;
        overflow: hidden;
        user-select: none;
        width: 100%;
    }
    .np-btn {
        background: none; border: none; color: white; cursor: pointer;
        width: 100%; padding: 0.3rem 0.5rem;
        display: flex; align-items: center; justify-content: center;
        opacity: 0.4; transition: opacity 0.1s, background 0.1s;
    }
    .np-btn:hover  { opacity: 1; background: rgba(26,148,138,0.18); }
    .np-btn:active { background: rgba(26,148,138,0.35); }
    .np-display {
        display: flex; align-items: baseline; justify-content: center;
        gap: 0.2rem; padding: 0.25rem 0.6rem;
        border-top: 1px solid rgba(26,148,138,0.2);
        border-bottom: 1px solid rgba(26,148,138,0.2);
        width: 100%;
    }
    .np-num  { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .np-unit { font-size: 0.85rem; font-weight: 600; opacity: 0.65; }
    /* ── END editable section ────────────────────────────────────────────── */
</style>
</head>
<body>

<div class="footer">
Made with Love, <br>
by <b>Rhodune!</b>,
for you ❤️
</div>

<p style="opacity:0.45;font-size:0.8rem">
    Clicking ENCENDER/APAGAR or the swap button swaps the rows.<br>
    Changing a sensor dropdown syncs both. Long-press the picker arrows.
</p>

<div class="rule-inner" style="width:32rem">
    <div class="thresh-grid">

        <!-- ── Header row ───────────────────────────────────────────────── -->
        <div class="tg-hdr">Sensor</div>
        <div class="tg-hdr">Condición</div>
        <div class="tg-hdr">Valor</div>
        <div></div>
        <div class="tg-hdr">Salida</div>

        <!-- ── Row 0: menor que (lower threshold) ───────────────────────── -->
        <div>
            <select class="thresh-sensor-sel" id="tsen0" onchange="syncSensor(0)">
                <option value="temp" selected>Temperatura</option>
                <option value="hum">Humedad</option>
            </select>
        </div>

        <div class="tg-cond">
            <span class="thresh-cond-lbl">menor que</span>
            <svg class="thresh-chevron" width="10" height="12" viewBox="0 0 10 12" fill="none">
                <path d="M8 1L2 6L8 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <div class="num-picker">
            <button class="np-btn"
                onmousedown="npStart('disp0','val0',1)" onmouseup="npStop()" onmouseleave="npStop()"
                ontouchstart="npStart('disp0','val0',1)" ontouchend="npStop()">
                <svg width="16" height="9" viewBox="0 0 16 9" fill="none">
                    <path d="M1 8L8 1L15 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="np-display">
                <span class="np-num" id="disp0">20</span>
                <span class="np-unit" id="tunit0">°C</span>
            </div>
            <input type="hidden" id="val0" value="20">
            <button class="np-btn"
                onmousedown="npStart('disp0','val0',-1)" onmouseup="npStop()" onmouseleave="npStop()"
                ontouchstart="npStart('disp0','val0',-1)" ontouchend="npStop()">
                <svg width="16" height="9" viewBox="0 0 16 9" fill="none">
                    <path d="M1 1L8 8L15 1" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div class="thresh-arrow">
            <svg width="18" height="10" viewBox="0 0 18 10" fill="none">
                <path d="M1 5H16M16 5L11 1M16 5L11 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <button class="thresh-badge on" id="tbadge0" onclick="swapActions()">ENCENDER</button>

        <!-- ── Swap button row (cols 1-4 empty, button in col 5) ──────────── -->
        <div></div><div></div><div></div><div></div>
        <button class="thresh-swap-btn" onclick="swapActions()">
            <svg width="36" height="36" viewBox="0 0 24 20" fill="none">
                <path d="M6 2v14M6 16l-3-4M6 16l3-4M18 16V2M18 2l-3 4M18 2l3 4"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- ── Row 1: mayor que (upper threshold) ───────────────────────── -->
        <div>
            <select class="thresh-sensor-sel" id="tsen1" onchange="syncSensor(1)">
                <option value="temp" selected>Temperatura</option>
                <option value="hum">Humedad</option>
            </select>
        </div>

        <div class="tg-cond">
            <span class="thresh-cond-lbl">mayor que</span>
            <svg class="thresh-chevron" width="10" height="12" viewBox="0 0 10 12" fill="none">
                <path d="M2 1L8 6L2 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <div class="num-picker">
            <button class="np-btn"
                onmousedown="npStart('disp1','val1',1)" onmouseup="npStop()" onmouseleave="npStop()"
                ontouchstart="npStart('disp1','val1',1)" ontouchend="npStop()">
                <svg width="16" height="9" viewBox="0 0 16 9" fill="none">
                    <path d="M1 8L8 1L15 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="np-display">
                <span class="np-num" id="disp1">30</span>
                <span class="np-unit" id="tunit1">°C</span>
            </div>
            <input type="hidden" id="val1" value="30">
            <button class="np-btn"
                onmousedown="npStart('disp1','val1',-1)" onmouseup="npStop()" onmouseleave="npStop()"
                ontouchstart="npStart('disp1','val1',-1)" ontouchend="npStop()">
                <svg width="16" height="9" viewBox="0 0 16 9" fill="none">
                    <path d="M1 1L8 8L15 1" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div class="thresh-arrow">
            <svg width="18" height="10" viewBox="0 0 18 10" fill="none">
                <path d="M1 5H16M16 5L11 1M16 5L11 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <button class="thresh-badge off" id="tbadge1" onclick="swapActions()">APAGAR</button>

    </div><!-- /.thresh-grid -->

    <button class="save-rule" onclick="fakeSave(this)">Guardar</button>
</div>

<script>
    // ── Sensor sync ──────────────────────────────────────────────────────────
    function syncSensor(src) {
        const val = document.getElementById(`tsen${src}`).value;
        document.getElementById(`tsen${src === 0 ? 1 : 0}`).value = val;
        const unit = val === 'hum' ? '%' : '°C';
        document.getElementById('tunit0').textContent = unit;
        document.getElementById('tunit1').textContent = unit;
    }

    // ── Badge swap ───────────────────────────────────────────────────────────
    function swapActions() {
        const b0 = document.getElementById('tbadge0');
        const b1 = document.getElementById('tbadge1');
        const wasOn = b0.classList.contains('on');
        b0.className = `thresh-badge ${wasOn ? 'off' : 'on'}`;
        b0.textContent = wasOn ? 'APAGAR' : 'ENCENDER';
        b1.className = `thresh-badge ${wasOn ? 'on' : 'off'}`;
        b1.textContent = wasOn ? 'ENCENDER' : 'APAGAR';
    }

    // ── Number picker ────────────────────────────────────────────────────────
    const STEP     = 1;
    const DELAY_MS = 380;
    const RATE_MS  = 100;
    let _npTimer   = null;

    function npTick(dispId, hidId, dir) {
        const hid  = document.getElementById(hidId);
        const disp = document.getElementById(dispId);
        const v    = Math.round((parseFloat(hid.value) + dir * STEP) * 10) / 10;
        hid.value  = v;
        disp.textContent = v % 1 === 0 ? v.toFixed(0) : v.toFixed(1);
    }

    function npStart(dispId, hidId, dir) {
        npTick(dispId, hidId, dir);
        _npTimer = setTimeout(() => {
            _npTimer = setInterval(() => npTick(dispId, hidId, dir), RATE_MS);
        }, DELAY_MS);
    }

    function npStop() {
        clearTimeout(_npTimer);
        clearInterval(_npTimer);
        _npTimer = null;
    }

    // ── Fake save ────────────────────────────────────────────────────────────
    function fakeSave(btn) {
        btn.textContent = '✓ Guardado';
        btn.style.background = '#15a185';
        setTimeout(() => { btn.textContent = 'Guardar'; btn.style.background = ''; }, 1500);
    }
</script>

</body>
</html>
