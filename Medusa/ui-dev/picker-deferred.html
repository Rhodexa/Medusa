<script>
// ─── Picker constants ─────────────────────────────────────────────────────────

const SVG_UP = `<svg width="16" height="9" viewBox="0 0 16 9" fill="none"><path d="M1 8L8 1L15 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const SVG_DN = `<svg width="16" height="9" viewBox="0 0 16 9" fill="none"><path d="M1 1L8 8L15 1" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const NP_DELAY = 340, NP_RATE = 80;
let _npTimer = null;

// ─── Picker HTML ──────────────────────────────────────────────────────────────

function pickerHTML(pid, dispId, val, unit) {
    return `<div class="num-picker" id="${pid}">
        <button class="np-btn" id="${pid}-up">${SVG_UP}</button>
        <div class="np-display" id="${pid}-tap">
            <span class="np-num" id="${dispId}">${val}</span>
            <span class="np-unit">${unit}</span>
        </div>
        <button class="np-btn" id="${pid}-dn">${SVG_DN}</button>
    </div>`;
}

// ─── Long-press ───────────────────────────────────────────────────────────────

function bindLongPress(el, fn) {
    const stop = () => { clearTimeout(_npTimer); clearInterval(_npTimer); _npTimer = null; };
    el.addEventListener('pointerdown',   () => { fn(); _npTimer = setTimeout(() => { _npTimer = setInterval(fn, NP_RATE); }, NP_DELAY); });
    el.addEventListener('pointerup',     stop);
    el.addEventListener('pointerleave',  stop);
    el.addEventListener('pointercancel', stop);
}

// ─── Drag + tap ───────────────────────────────────────────────────────────────

function bindPicker(pid, stepFn, tapFn, pxPerStep) {
    bindLongPress(document.getElementById(pid+'-up'), () => stepFn( 1));
    bindLongPress(document.getElementById(pid+'-dn'), () => stepFn(-1));
    const tap = document.getElementById(pid+'-tap');
    let lastY = null, accum = 0, moved = 0;
    tap.addEventListener('pointerdown', e => {
        lastY = e.clientY; accum = 0; moved = 0;
        tap.setPointerCapture(e.pointerId); e.preventDefault();
    });
    tap.addEventListener('pointermove', e => {
        if (lastY === null) return;
        const dy = lastY - e.clientY;
        lastY = e.clientY; accum += dy; moved += Math.abs(dy);
        while (accum >=  pxPerStep) { stepFn( 1); accum -= pxPerStep; }
        while (accum <= -pxPerStep) { stepFn(-1); accum += pxPerStep; }
    });
    tap.addEventListener('pointerup',     () => { if (moved < 6) tapFn(); lastY = null; });
    tap.addEventListener('pointercancel', () => { lastY = null; });
}

// ─── createDial ───────────────────────────────────────────────────────────────
// Full dial with label, two pickers (h + m), long-press buttons, drag, tap-to-modal.
// Used as: const d = createDial(containerId, id, label, initMin, onChange)

function createDial(containerId, id, label, initMin, onChange) {
    const raw = { value: Math.max(0, Math.round(initMin)) };
    const hours   = () => Math.floor(raw.value / 60);
    const minutes = () => raw.value % 60;
    function update() {
        raw.value = Math.max(0, raw.value);
        document.getElementById(`${id}-h`).textContent = hours();
        document.getElementById(`${id}-m`).textContent = String(minutes()).padStart(2, '0');
        if (onChange) onChange(raw.value);
    }
    function stepH(dir) { raw.value += dir * 60; update(); }
    function stepM(dir) { raw.value += dir;       update(); }
    function editHours() {
        openModal('Horas', hours(), 0, null, v => { raw.value += (v - hours()) * 60; update(); });
    }
    function editMinutes() {
        openModal('Minutos', minutes(), 0, 59, v => { raw.value += v - minutes(); update(); });
    }
    document.getElementById(containerId).innerHTML = `
        <div class="timer-row">
            <span class="timer-lbl">${label}</span>
            <div class="timer-pair">
                ${pickerHTML(id+'-ph', id+'-h', hours(), 'h')}
                ${pickerHTML(id+'-pm', id+'-m', String(minutes()).padStart(2,'0'), 'min')}
            </div>
        </div>`;
    bindPicker(id+'-ph', d => stepH(d), editHours,   14);
    bindPicker(id+'-pm', d => stepM(d), editMinutes, 14);
    return { getRaw: () => raw.value };
}

// ─── createTimeSide ───────────────────────────────────────────────────────────
// Renders just the h+m picker pair (no label) into a container.
// Used in the side-by-side timer card layout.

function createTimeSide(pickersId, id, initMin, onChange) {
    const raw = { value: Math.max(0, Math.round(initMin)) };
    const h = () => Math.floor(raw.value / 60);
    const m = () => raw.value % 60;
    function upd() {
        raw.value = Math.max(0, raw.value);
        document.getElementById(`${id}-h`).textContent = h();
        document.getElementById(`${id}-m`).textContent = String(m()).padStart(2,'0');
        if (onChange) onChange();
    }
    document.getElementById(pickersId).innerHTML =
        pickerHTML(`${id}-ph`, `${id}-h`, h(), 'h') +
        pickerHTML(`${id}-pm`, `${id}-m`, String(m()).padStart(2,'0'), 'min');
    bindPicker(`${id}-ph`, d => { raw.value += d*60; upd(); },
        () => openModal('Horas',   h(), 0, null, v => { raw.value += (v-h())*60; upd(); }), 14);
    bindPicker(`${id}-pm`, d => { raw.value += d;    upd(); },
        () => openModal('Minutos', m(), 0, 59,  v => { raw.value += v-m();       upd(); }), 14);
    return { getRaw: () => raw.value };
}

// ─── initTimerDials (picker version) ─────────────────────────────────────────
// Drop-in replacement for the simple-input version in index.html.

function initTimerDials(mac, i, out) {
    const key    = `${mac}-${i}`;
    const onMin  = Math.round((out.on_ms  || 0) / 60000);
    const offMin = Math.round((out.off_ms || 0) / 60000);
    const onId   = `tdon-${mac}-${i}`;
    const offId  = `tdoff-${mac}-${i}`;

    document.getElementById(`td-${mac}-${i}`).innerHTML = `
        <div class="timer-sides">
            <div class="timer-side">
                <div class="timer-side-sub">Tiempo</div>
                <div class="timer-side-lbl">Encendido</div>
                <div class="timer-side-pickers" id="${onId}-wrap"></div>
            </div>
            <div class="timer-side-sep"></div>
            <div class="timer-side">
                <div class="timer-side-sub">Tiempo</div>
                <div class="timer-side-lbl">Apagado</div>
                <div class="timer-side-pickers" id="${offId}-wrap"></div>
            </div>
        </div>`;

    const onDial  = createTimeSide(`${onId}-wrap`,  onId,  onMin,  null);
    const offDial = createTimeSide(`${offId}-wrap`, offId, offMin, null);

    dialStore[key] = {
        on:  onDial,
        off: offDial
    };
}

// ─── Modal ────────────────────────────────────────────────────────────────────

let _mCb = null, _mMax = null;

function openModal(title, cur, min, max, cb) {
    _mCb = cb; _mMax = max;
    document.getElementById('modalTitle').textContent = title;
    const inp = document.getElementById('modalInput');
    inp.min = min ?? 0; inp.max = max ?? ''; inp.value = cur;
    document.getElementById('dialModal').classList.add('open');
    setTimeout(() => { inp.focus(); inp.select(); }, 60);
}
function modalConfirm() {
    let v = parseInt(document.getElementById('modalInput').value, 10);
    if (isNaN(v) || v < 0) v = 0;
    if (_mMax != null && v > _mMax) v = _mMax;
    document.getElementById('dialModal').classList.remove('open');
    if (_mCb) _mCb(v);
    _mCb = null;
}
function modalCancel() {
    document.getElementById('dialModal').classList.remove('open');
    _mCb = null;
}
// Wire up after DOM ready:
// document.getElementById('dialModal').addEventListener('click', e => { if (e.target===e.currentTarget) modalCancel(); });
// document.getElementById('modalInput').addEventListener('keydown', e => { if(e.key==='Enter') modalConfirm(); if(e.key==='Escape') modalCancel(); });
</script>
